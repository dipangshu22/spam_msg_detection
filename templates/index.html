<!DOCTYPE html>
<html>
<head>
<title>Spam Detector</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
background:white;
padding:40px;
width:420px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
}

h2{
margin-bottom:20px;
color:#333;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
resize:none;
font-size:15px;
outline:none;
transition:0.3s;
}

textarea:focus{
border-color:#4facfe;
box-shadow:0 0 5px rgba(79,172,254,0.5);
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#4facfe;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#2f8cff;
transform:scale(1.03);
}

.result{
margin-top:20px;
font-size:18px;
font-weight:500;
color:#444;
}

</style>
</head>

<body>

<div class="container">

<h2>Spam Message Detector</h2>

<form action="/predict" method="post">

<textarea name="message" placeholder="Enter message here..."></textarea>

<button type="submit">Check Message</button>

</form>

<div class="result">
<h3>{{ prediction_text }}</h3>
</div>

</div>

</body>
</html>
